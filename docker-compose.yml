services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma_db
      - uploads:/app/uploads
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-documind}:${POSTGRES_PASSWORD:-documind_secret}@postgres:5432/${POSTGRES_DB:-documind}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-documind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-documind_secret}
      POSTGRES_DB: ${POSTGRES_DB:-documind}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-documind}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  chroma_data:
  uploads:
